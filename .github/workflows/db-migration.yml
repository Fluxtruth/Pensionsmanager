name: Database Migrations
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.SUPABASE_DB_URL_PROD }}" >> $GITHUB_ENV
          else
            echo "env_name=development" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.SUPABASE_DB_URL_DEV }}" >> $GITHUB_ENV
          fi

      - name: Run Supabase Migrations
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and Push
        run: |
          supabase link --project-ref ${{ steps.set-env.outputs.env_name == 'production' && 'rnmhcvuqhazfvqukbhmg' || 'xnbuytphihwxvikrqgvs' }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
