name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies (npm)
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pensionsmanager ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false

      - name: Generate update.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Substring(1)
          
          Write-Host "Looking for signature files in bundle directories..."
          $SIG_FILE = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.sig" | Select-Object -First 1
          
          if ($SIG_FILE) {
            $SIG_PATH = $SIG_FILE.FullName
            $SIG = Get-Content $SIG_PATH
            $ASSET_NAME = $SIG_FILE.Name.Replace(".sig", "")
            Write-Host "Found signature for asset: $ASSET_NAME"
            
            $JSON = @{
              version = $VERSION
              pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ").ToString()
              platforms = @{
                "windows-x86_64" = @{
                  signature = $SIG
                  url = "https://github.com/Fluxtruth/Pensionsmanager/releases/download/${{ github.ref_name }}/$ASSET_NAME"
                }
              }
            } | ConvertTo-Json -Depth 5
            Set-Content update.json $JSON
            gh release upload ${{ github.ref_name }} update.json --clobber
          } else {
            Write-Error "Signature file not found in bundle directory! Showing all files:"
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
