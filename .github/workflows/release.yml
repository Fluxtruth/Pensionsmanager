name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release-tauri:
    permissions:
      contents: write
    environment: production
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies (npm)
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pensionsmanager ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false

      - name: Generate update.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Substring(1)
          $BUNDLE_PATH = "src-tauri/target/release/bundle"
          
          Write-Host "Searching for artifacts in: $BUNDLE_PATH"
          $SIG_FILES = Get-ChildItem -Path $BUNDLE_PATH -Recurse -Filter "*.sig"
          
          if ($SIG_FILES.Count -eq 0) {
            Write-Error "No .sig files found! Updater JSON cannot be generated."
            Get-ChildItem -Path $BUNDLE_PATH -Recurse | Select-Object FullName
            exit 1
          }

          $PLATFORMS = @{}
          
          foreach ($SIG_FILE in $SIG_FILES) {
            $SIG = Get-Content $SIG_FILE.FullName -Raw
            $ASSET_NAME = $SIG_FILE.Name.Replace(".sig", "")
            
            Write-Host "Processing signature for: $ASSET_NAME"
            
            # Identify platform based on filename
            $PLATFORM_KEY = $null
            if ($ASSET_NAME -like "*x64*" -or $ASSET_NAME -like "*x86_64*") {
              if ($ASSET_NAME -like "*.msi*") {
                $PLATFORM_KEY = "windows-x86_64"
              }
            } elseif ($ASSET_NAME -like "*aarch64*" -and $ASSET_NAME -like "*.msi*") {
              $PLATFORM_KEY = "windows-aarch64"
            }
            # Add more platform checks if needed (macos, linux)

            if ($PLATFORM_KEY) {
              $PLATFORMS[$PLATFORM_KEY] = @{
                signature = $SIG.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$ASSET_NAME"
              }
              Write-Host "Mapped $ASSET_NAME to $PLATFORM_KEY"
            }
          }

          if ($PLATFORMS.Count -eq 0) {
            Write-Error "Could not map any signatures to supported platforms."
            exit 1
          }

          $JSON = @{
            version = $VERSION
            notes = "Release ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ").ToString()
            platforms = $PLATFORMS
          } | ConvertTo-Json -Depth 10
          
          Set-Content update.json $JSON
          Write-Host "Generated update.json:"
          Write-Host $JSON
          
          gh release upload ${{ github.ref_name }} update.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
